<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hacker News Clone</title>
    <link rel="stylesheet" href="style.css" />
    <script src="globals.js" defer></script>
    <script src="api.js" defer></script>
    <script src="comments.js" defer></script>
    <script src="posts.js" defer></script>
    <script src="events.js" defer></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <header>
      <span class="logo">▲ Hacker News Clone</span>
      <nav>
        <button class="tab active" data-feed="newstories">Stories</button>
        <button class="tab" data-feed="jobstories">Jobs</button>
        <button class="tab" data-feed="pollstories">Polls</button>
      </nav>
    </header>

    <div id="toast" class="toast hidden"></div>

    <main>
      <div id="post-list"></div>
      <div id="load-more-trigger"></div>
      <div id="status"></div>
    </main>

    <!-- Comment Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-box">
        <button id="modal-close">✕ Close</button>
        <div id="modal-content"></div>
      </div>
    </div>
  </body>
</html>
